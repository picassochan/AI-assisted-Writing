name: Build plugin zip and attach to Release
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build zip
        run: |
          PLUGIN_SLUG="ai-assisted-writing"
          ZIP_NAME="${PLUGIN_SLUG}.zip"
          mkdir -p build/${PLUGIN_SLUG}
          rsync -a --delete ./ build/${PLUGIN_SLUG}/ \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "build" \
            --exclude "node_modules" \
            --exclude "*.zip"
          cd build
          zip -r "../${ZIP_NAME}" "${PLUGIN_SLUG}"
      - name: Upload zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ai-assisted-writing.zip
